<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Snow Effect -->
    <div class="snowflakes" aria-hidden="true"></div>

    <div class="container">
        <!-- Access Screen -->
        <div id="accessScreen" class="access-screen">
            <div class="incognito-icon">
                <img src="https://static.vecteezy.com/system/resources/previews/036/475/917/non_2x/agent-or-spy-icon-incognito-logo-vector.jpg" alt="Incognito">
            </div>
            <h1>Website Portal</h1>
            <p class="subtitle">Enter access code</p>
            <input type="password" id="codeInput" class="code-input" placeholder="Enter code">
            <button onclick="checkCode()" class="btn">Enter</button>
            <p id="errorMsg" class="error-msg"></p>
        </div>

        <!-- Main Screen -->
        <div id="gamesScreen" class="games-screen hidden">

            <!-- Announcements Bar -->
            <div id="announcementBar" class="announcement-bar">
                <span id="announcementText">
                    2/2/26: site fixes | Fact of the day: Loading...
                </span>
            </div>

            <div class="header">
                <div class="header-left">
                    <h1 id="mainTitle">Library</h1>
                </div>
                <button onclick="logout()" class="btn-logout" id="logoutBtn">Logout</button>
            </div>
            
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="Search..." oninput="filterGames()">
                <span class="search-icon">🔍</span>
            </div>
            
            <div id="gamesList" class="games-grid"></div>
            <p class="no-games hidden" id="noGames">No items available</p>
        </div>
    </div>

    <script src="script.js"></script>

    <!-- APRIL FOOLS CHAOS SCRIPT -->
    <script>
        // April Fools mode activates!
        let aprilFoolsActive = false;
        let chaosLevel = 0;

        function activateAprilFools() {
            if (aprilFoolsActive) return;
            aprilFoolsActive = true;

            const header = document.getElementById('mainTitle');
            const logoutBtn = document.getElementById('logoutBtn');
            const searchInput = document.getElementById('searchInput');

            // The title gets increasingly unhinged
            const titleSequence = [
                'Library'
            ];

            let titleIndex = 0;
            setInterval(() => {
                titleIndex = (titleIndex + 1) % titleSequence.length;
                header.textContent = titleSequence[titleIndex];
            }, 3000);

            // Logout button plays hard to get
            let dodgeCount = 0;
            logoutBtn.addEventListener('mouseenter', function(e) {
                if (dodgeCount < 5) {
                    const randomX = Math.random() * 200 - 100;
                    const randomY = Math.random() * 200 - 100;
                    this.style.transform = `translate(${randomX}px, ${randomY}px)`;
                    this.textContent = ['Logout', 'Nope', 'Try Again', 'Almost!', 'So Close!'][dodgeCount];
                    dodgeCount++;
                } else {
                    this.style.transform = '';
                    this.textContent = 'Fine, Logout';
                }
            });

            // Search bar gets sassy
            const searchPhrases = [
                'Search...',
                'Looking for something?',
                'It\'s not here',
                'Try again',
                'Nope, still not here',
                'Are you sure?',
                'Maybe check behind you',
                'I don\'t have it',
                'Search... (but like, why)',
                'This is pointless',
                'I\'m just a search bar',
                'I have feelings too'
            ];

            let searchIndex = 0;
            searchInput.addEventListener('focus', function() {
                searchIndex = (searchIndex + 1) % searchPhrases.length;
                this.placeholder = searchPhrases[searchIndex];
            });

            // Cards start doing weird things
            setTimeout(() => startCardChaos(), 5000);
        }

        function startCardChaos() {
            const cards = document.querySelectorAll('.game-card');
            
            // Random card gets replaced with confusion
            setInterval(() => {
                const randomCard = cards[Math.floor(Math.random() * cards.length)];
                if (randomCard && Math.random() > 0.7) {
                    const originalHTML = randomCard.innerHTML;
                    const confusionMessages = [
                        '<h3>???</h3><p>Click if you dare</p>',
                        '<h3>ERROR 404</h3><p>Game not found</p>',
                        '<h3>Coming Soon</h3><p>JK it\'s here</p>',
                        '<h3>This One</h3><p>Or is it?</p>',
                        '<h3>SURPRISE!</h3><p>It\'s still the same</p>',
                        '<h3>Don\'t Click</h3><p>Reverse psychology</p>',
                        '<h3>Click Me!</h3><p>No seriously</p>',
                        '<h3>🎮</h3><p>This is a game</p>'
                    ];
                    
                    randomCard.innerHTML = confusionMessages[Math.floor(Math.random() * confusionMessages.length)];
                    
                    setTimeout(() => {
                        randomCard.innerHTML = originalHTML;
                    }, 2000);
                }
            }, 4000);

            // Cards randomly rotate
            setInterval(() => {
                cards.forEach((card, index) => {
                    if (Math.random() > 0.6) {
                        const rotation = (Math.random() - 0.5) * 360;
                        card.style.transition = 'transform 0.5s ease';
                        card.style.transform = `rotate(${rotation}deg)`;
                        
                        setTimeout(() => {
                            card.style.transform = 'rotate(0deg)';
                        }, 500);
                    }
                });
            }, 6000);

            // Random upside down card
            setInterval(() => {
                const randomCard = cards[Math.floor(Math.random() * cards.length)];
                if (randomCard) {
                    randomCard.style.transition = 'transform 0.8s ease';
                    randomCard.style.transform = 'rotateX(180deg)';
                    
                    setTimeout(() => {
                        randomCard.style.transform = 'rotateX(0deg)';
                    }, 2000);
                }
            }, 8000);
        }

        // Activate when games screen shows
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                const gamesScreen = document.getElementById('gamesScreen');
                if (gamesScreen && !gamesScreen.classList.contains('hidden')) {
                    activateAprilFools();
                }
            });
        });

        observer.observe(document.body, { 
            attributes: true, 
            subtree: true, 
            attributeFilter: ['class'] 
        });
    </script>

    <!-- FACT OF THE DAY SCRIPT -->
    <script>
        (async function factOfTheDay() {
            const announcement = document.getElementById("announcementText");

            const manualAnnouncement = "enjoy fact of the day!";

            // Local date key (not UTC)
            function getLocalDateKey() {
                const now = new Date();
                return `${now.getFullYear()}-${now.getMonth() + 1}-${now.getDate()}`;
            }

            const todayKey = getLocalDateKey();
            const saved = JSON.parse(localStorage.getItem("dailyFact"));

            // If same local day, reuse saved fact
            if (saved && saved.date === todayKey) {
                announcement.textContent = `${manualAnnouncement} | Fact of the day: ${saved.fact}`;
                return;
            }

            // Fetch new fact if day changed
            try {
                const res = await fetch("https://uselessfacts.jsph.pl/api/v2/facts/random");
                const data = await res.json();
                const fact = data.text;

                localStorage.setItem("dailyFact", JSON.stringify({
                    date: todayKey,
                    fact
                }));

                announcement.textContent = `${manualAnnouncement} | Fact of the day: ${fact}`;
            } catch (err) {
                announcement.textContent = `${manualAnnouncement} | Fact of the day: unavailable`;
                console.error("Fact API error:", err);
            }
        })();
    </script>

    <!-- Snow Effect -->
    <script>
        (function() {
            function initSnow() {
                const snowContainer = document.querySelector('.snowflakes');
                if (!snowContainer) return;

                let snowflakes = [];

                function createSnowflake() {
                    if (snowflakes.length >= 30) return;

                    const snowflake = document.createElement('div');
                    snowflake.className = 'snowflake';

                    const startX = Math.random() * window.innerWidth;
                    const size = Math.random() * 4 + 2;
                    const duration = Math.random() * 3 + 4;
                    const windOffset = Math.random() * 100 - 50;

                    snowflake.style.left = startX + 'px';
                    snowflake.style.width = size + 'px';
                    snowflake.style.height = size + 'px';
                    snowflake.style.opacity = Math.random() * 0.6 + 0.4;

                    snowContainer.appendChild(snowflake);
                    snowflakes.push(snowflake);

                    const startTime = Date.now();

                    function animate() {
                        const elapsed = (Date.now() - startTime) / 1000;
                        const progress = elapsed / duration;

                        if (progress >= 1) {
                            snowflake.remove();
                            snowflakes = snowflakes.filter(s => s !== snowflake);
                            return;
                        }

                        const y = progress * window.innerHeight;
                        const x = startX + (windOffset * progress);

                        snowflake.style.transform = `translate(${x - startX}px, ${y}px)`;

                        requestAnimationFrame(animate);
                    }

                    animate();
                }

                setInterval(createSnowflake, 200);

                for (let i = 0; i < 15; i++) {
                    setTimeout(createSnowflake, i * 200);
                }
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initSnow);
            } else {
                initSnow();
            }
        })();
    </script>

</body>
</html>
