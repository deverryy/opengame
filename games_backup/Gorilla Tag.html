<!-- DOMAIN PROTECTION SCRIPT - AUTO-GENERATED -->
<script>
(function() {
    'use strict';

    const ALLOWED_DOMAINS = [
        "portal.dever.pro",
        "www.portal.dever.pro",
        "localhost",
        "127.0.0.1",
        "gam12.netlify.app",
        "www.gam12.netlify.app"
];

    if (window.location.protocol === 'file:') {
        blockAccess('This game cannot be run from a local file.');
        return;
    }

    const currentDomain = window.location.hostname;
    const isAllowed = ALLOWED_DOMAINS.some(domain =>
        currentDomain === domain || currentDomain.endsWith('.' + domain)
    );

    if (!isAllowed) {
        blockAccess('This game can only be played on the official website.');
        return;
    }

    if (window.top === window.self) {
        blockAccess('This game must be launched from the official portal.');
        return;
    }

    try {
        const parentDomain = new URL(window.top.location.href).hostname;
        const isParentAllowed = ALLOWED_DOMAINS.some(domain =>
            parentDomain === domain || parentDomain.endsWith('.' + domain)
        );
        if (!isParentAllowed) throw 0;
    } catch {
        blockAccess('This game must be launched from the official portal.');
        return;
    }

    function blockAccess(message) {
        document.body.innerHTML = '';
        const overlay = document.createElement('div');
        overlay.innerHTML = `
            <div style="display:flex;align-items:center;justify-content:center;height:100vh;
            background:#000;color:#fff;font-family:Arial;text-align:center;">
                <div>
                    <h1 style="color:#d70000;font-size:2.5em;">🚫 Access Denied</h1>
                    <p style="font-size:1.2em;">${message}</p>
                </div>
            </div>`;
        overlay.style.cssText = 'position:fixed;inset:0;z-index:2147483647;';
        document.body.appendChild(overlay);
        document.body.style.overflow = 'hidden';
        throw new Error('Blocked');
    }

    // ❌ PAUSE SYSTEM REMOVED
})();
</script>




	<div id="loading-text" style="color: white; font-size: 48px; font-family: cursive; text-align: center; margin-top: 20px;"> LOADING... </div>

    <script>
        var loadingText = document.querySelector("#loading-text");
        let totalBytes = 0;
        let loadedBytes = 0;

        async function fetchWithProgress(url) {
            const response = await fetch(url);
            const reader = response.body.getReader();
            let chunks = [];
            let received = 0;
            while (true) {
                const {
                    done,
                    value
                } = await reader.read();
                if (done) break;
                received += value.length;
                loadedBytes += value.length;
                chunks.push(value);
                let mbDone = (loadedBytes / (1024 * 1024)).toFixed(2);
                let mbTotal = '150.89';
                loadingText.textContent = `LOADING... ${mbDone} MB / ${mbTotal} MB`;
            }
            let fullBuffer = new Uint8Array(received);
            let offset = 0;
            for (let chunk of chunks) {
                fullBuffer.set(chunk, offset);
                offset += chunk.length;
            }
            return fullBuffer.buffer;
        }
        async function mergeFiles(fileParts, cacheKey) {
            const buffers = await Promise.all(
                fileParts.map(part => fetchWithProgress(part))
            );
            const mergedBlob = new Blob(buffers);
            return URL.createObjectURL(mergedBlob);
        }

        function getParts(file, start, end) {
            let parts = [];
            for (let i = start; i <= end; i++) {
                parts.push(file + ".part" + i);
            }
            return parts;
        }
        (async () => {
            const [dataUrl] = await Promise.all([
                mergeFiles(getParts("Build/gtagwebR2.data.unityweb", 1, 8), "gtagwebR2.data.unityweb"),
            ]);
            var buildUrl = "Build";
      var loaderUrl = buildUrl + "/gtagwebR2.loader.js";
      var config = {
        dataUrl: dataUrl,
        frameworkUrl: buildUrl + "/gtagwebR2.framework.js.unityweb",
        codeUrl: buildUrl + "/gtagwebR2.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "boolonx",
        productName: "gorilla tag web",
        productVersion: "1.0",
      };
            var container = document.querySelector("#unity-container");
            container.hidden = false;
            var canvas = document.querySelector("#unity-canvas");
            var loadingBar = document.querySelector("#unity-loading-bar");
            var progressBarFull = document.querySelector("#unity-progress-bar-full");
            if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
                container.className = "unity-mobile";
                config.devicePixelRatio = 1;
            } else {
                if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
                    var meta = document.createElement('meta');
                    meta.name = 'viewport';
                    meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
                    document.getElementsByTagName('head')[0].appendChild(meta);
                    container.className = "unity-mobile";
                    canvas.className = "unity-mobile";
                } else {
                    function resizeCanvas() {
                        canvas.width = window.innerWidth;
                        canvas.height = window.innerHeight;
                        canvas.style.width = window.innerWidth + "px";
                        canvas.style.height = window.innerHeight + "px";
                    }
                    resizeCanvas();
                    window.addEventListener('resize', resizeCanvas);
                }
            }
            loadingBar.style.display = "block";
            var script = document.createElement("script");
            script.src = loaderUrl;
            script.onload = () => {
                createUnityInstance(canvas, config, (progress) => {
                    progressBarFull.style.width = 100 * progress + "%";
                }).then((unityInstance) => {
                    loadingText.remove();
                    loadingBar.style.display = "none";
                    canvas.style.display = "block";
                }).catch(async (message) => {
                    alert(message);
                });

            };
            document.body.appendChild(script);
        })();
    </script>
