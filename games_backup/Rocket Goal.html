<!-- DOMAIN PROTECTION SCRIPT - AUTO-GENERATED -->
<script>
(function() {
    'use strict';

    const ALLOWED_DOMAINS = [
        "portal.dever.pro",
        "www.portal.dever.pro",
        "localhost",
        "127.0.0.1",
        "gam12.netlify.app",
        "www.gam12.netlify.app"
];

    if (window.location.protocol === 'file:') {
        blockAccess('This game cannot be run from a local file.');
        return;
    }

    const currentDomain = window.location.hostname;
    const isAllowed = ALLOWED_DOMAINS.some(domain =>
        currentDomain === domain || currentDomain.endsWith('.' + domain)
    );

    if (!isAllowed) {
        blockAccess('This game can only be played on the official website.');
        return;
    }

    if (window.top === window.self) {
        blockAccess('This game must be launched from the official portal.');
        return;
    }

    try {
        const parentDomain = new URL(window.top.location.href).hostname;
        const isParentAllowed = ALLOWED_DOMAINS.some(domain =>
            parentDomain === domain || parentDomain.endsWith('.' + domain)
        );
        if (!isParentAllowed) throw 0;
    } catch {
        blockAccess('This game must be launched from the official portal.');
        return;
    }

    function blockAccess(message) {
        document.body.innerHTML = '';
        const overlay = document.createElement('div');
        overlay.innerHTML = `
            <div style="display:flex;align-items:center;justify-content:center;height:100vh;
            background:#000;color:#fff;font-family:Arial;text-align:center;">
                <div>
                    <h1 style="color:#d70000;font-size:2.5em;">🚫 Access Denied</h1>
                    <p style="font-size:1.2em;">${message}</p>
                </div>
            </div>`;
        overlay.style.cssText = 'position:fixed;inset:0;z-index:2147483647;';
        document.body.appendChild(overlay);
        document.body.style.overflow = 'hidden';
        throw new Error('Blocked');
    }

    // ❌ PAUSE SYSTEM REMOVED
})();
</script>















  <div id="unity-container">
    <canvas id="unity-canvas" width="703" height="511" tabindex="-1"></canvas>

    <div id="unity-loading-bar" style="display:none;">
      <div id="loading-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>

    <div id="unity-warning"></div>
  </div>

  <script>
    const container = document.querySelector("#unity-container");
    const canvas = document.querySelector("#unity-canvas");
    const loadingBar = document.querySelector("#unity-loading-bar");
    const progressBarFull = document.querySelector("#unity-progress-bar-full");
    const warningBanner = document.querySelector("#unity-warning");

    function unityShowBanner(msg, type) {
      const div = document.createElement('div');
      div.innerHTML = msg;
      warningBanner.appendChild(div);
      if (type === 'error') div.style = 'background:red;padding:10px;';
      else setTimeout(() => div.remove(), 5000);
    }

    const LATEST_TXT_URL = "https://danidrorm.github.io/RGFiles/latest.txt";
    const REPO_CDN_BASE = "https://cdn.jsdelivr.net/gh/Danidrorm/RGFiles@";

    const UNITY_FILES = {
      loader: "b23dd96997961653e2825455633aac82.loader.js",
      data: "1c6b3fb6706375cf5f4e35c5d914385e.data.unityweb",
      framework: "98438f2e7a94945eb0c97aa68a131683.framework.js.unityweb",
      wasm: "def2138bbbbbb3dc09c6c604c4109263.wasm.unityweb",
    };

    async function fetchLatestRef() {
      const res = await fetch(LATEST_TXT_URL + "?t=" + Date.now(), { cache: "no-store" });
      return (await res.text()).trim();
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = src;
        s.onload = resolve;
        s.onerror = reject;
        document.body.appendChild(s);
      });
    }

    loadingBar.style.display = "block";

    (async () => {
      let ref = "main";
      try { ref = await fetchLatestRef(); } catch {}
      const buildUrl = REPO_CDN_BASE + ref;

      await loadScript(buildUrl + "/" + UNITY_FILES.loader);

      createUnityInstance(canvas, {
        dataUrl: buildUrl + "/" + UNITY_FILES.data,
        frameworkUrl: buildUrl + "/" + UNITY_FILES.framework,
        codeUrl: buildUrl + "/" + UNITY_FILES.wasm,
        streamingAssetsUrl: "StreamingAssets",
        productVersion: "0.302",
        showBanner: unityShowBanner,
      }, p => progressBarFull.style.width = (p * 100) + "%")
      .then(instance => {
        loadingBar.style.display = "none";
        window.unityInstance = instance;
        initializeFirebase(instance);
        initializeUtils(instance);
      });
    })();
  </script>
