<!-- DOMAIN PROTECTION SCRIPT - AUTO-GENERATED -->
<script>
(function() {
    'use strict';

    const ALLOWED_DOMAINS = [
        "portal.dever.pro",
        "www.portal.dever.pro",
        "localhost",
        "127.0.0.1",
        "gam12.netlify.app",
        "www.gam12.netlify.app"
];

    if (window.location.protocol === 'file:') {
        blockAccess('This game cannot be run from a local file.');
        return;
    }

    const currentDomain = window.location.hostname;
    const isAllowed = ALLOWED_DOMAINS.some(domain =>
        currentDomain === domain || currentDomain.endsWith('.' + domain)
    );

    if (!isAllowed) {
        blockAccess('This game can only be played on the official website.');
        return;
    }

    if (window.top === window.self) {
        blockAccess('This game must be launched from the official portal.');
        return;
    }

    try {
        const parentDomain = new URL(window.top.location.href).hostname;
        const isParentAllowed = ALLOWED_DOMAINS.some(domain =>
            parentDomain === domain || parentDomain.endsWith('.' + domain)
        );
        if (!isParentAllowed) throw 0;
    } catch {
        blockAccess('This game must be launched from the official portal.');
        return;
    }

    function blockAccess(message) {
        document.body.innerHTML = '';
        const overlay = document.createElement('div');
        overlay.innerHTML = `
            <div style="display:flex;align-items:center;justify-content:center;height:100vh;
            background:#000;color:#fff;font-family:Arial;text-align:center;">
                <div>
                    <h1 style="color:#d70000;font-size:2.5em;">🚫 Access Denied</h1>
                    <p style="font-size:1.2em;">${message}</p>
                </div>
            </div>`;
        overlay.style.cssText = 'position:fixed;inset:0;z-index:2147483647;';
        document.body.appendChild(overlay);
        document.body.style.overflow = 'hidden';
        throw new Error('Blocked');
    }

    // ❌ PAUSE SYSTEM REMOVED
})();
</script>


  <div id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas"></canvas>
  </div>

  <div id="unity-fullscreen-button" style="display: none;"></div>

  <script>
    const hideFullScreenButton = "1";
    const buildUrl = "https://cdn.jsdelivr.net/gh/googleuserclassroomcontent/wassat@main/Build";
    const loaderUrl = buildUrl + "/FNaF_Shooter_GD.loader.js";

    const config = {
      dataUrl: "",
      frameworkUrl: buildUrl + "/FNaF_Shooter_GD.framework.js.unityweb",
      codeUrl: buildUrl + "/FNaF_Shooter_GD.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "GoGoMan",
      productName: "FNaF Shooter",
      productVersion: "1.0.0"
    };

    const container = document.querySelector("#unity-container");
    const canvas = document.querySelector("#unity-canvas");
    const fullscreenButton = document.querySelector("#unity-fullscreen-button");

    const canFullscreen = (() => {
      return [
        "exitFullscreen",
        "webkitExitFullscreen",
        "webkitCancelFullScreen",
        "mozCancelFullScreen",
        "msExitFullscreen"
      ].some(key => key in document);
    })();

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      container.className = "unity-mobile";
      config.devicePixelRatio = 1;
    }

    canvas.style.background = "url('" + buildUrl + "/FNaF_Shooter_GD.jpg') center / cover";

    async function loadDataParts() {
      try {
        const urls = [
          buildUrl + "/FNaF_Shooter_GD.data.unityweb.part0",
          buildUrl + "/FNaF_Shooter_GD.data.unityweb.part1"
        ];

        const responses = await Promise.all(
          urls.map(url => fetch(url).then(res => {
            if (!res.ok) {
              throw new Error("HTTP " + res.status + " for " + url);
            }
            return res.arrayBuffer();
          }))
        );

        const totalLength = responses.reduce((sum, buffer) => sum + buffer.byteLength, 0);
        const combined = new Uint8Array(totalLength);

        let offset = 0;
        for (const buffer of responses) {
          combined.set(new Uint8Array(buffer), offset);
          offset += buffer.byteLength;
        }

        const blob = new Blob([combined], { type: "application/octet-stream" });
        config.dataUrl = URL.createObjectURL(blob);

        loadUnity();
      } catch (err) {
        alert("Veri dosyası parçaları yüklenemedi: " + err.message);
      }
    }

    function loadUnity() {
      const script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config).then(unityInstance => {
          if (canFullscreen && !parseInt(hideFullScreenButton)) {
            fullscreenButton.style.display = "";
            fullscreenButton.onclick = () => unityInstance.SetFullscreen(1);
          }
        }).catch(message => {
          alert(message);
        });
      };
      script.onerror = () => {
        alert("Unity loader yüklenemedi.");
      };
      document.body.appendChild(script);
    }

    loadDataParts();
  </script>
</body>
