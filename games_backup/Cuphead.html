<!-- DOMAIN PROTECTION SCRIPT - AUTO-GENERATED -->
<script>
(function() {
    'use strict';

    const ALLOWED_DOMAINS = [
        "portal.dever.pro",
        "www.portal.dever.pro",
        "localhost",
        "127.0.0.1",
        "gam12.netlify.app",
        "www.gam12.netlify.app"
];

    if (window.location.protocol === 'file:') {
        blockAccess('This game cannot be run from a local file.');
        return;
    }

    const currentDomain = window.location.hostname;
    const isAllowed = ALLOWED_DOMAINS.some(domain =>
        currentDomain === domain || currentDomain.endsWith('.' + domain)
    );

    if (!isAllowed) {
        blockAccess('This game can only be played on the official website.');
        return;
    }

    if (window.top === window.self) {
        blockAccess('This game must be launched from the official portal.');
        return;
    }

    try {
        const parentDomain = new URL(window.top.location.href).hostname;
        const isParentAllowed = ALLOWED_DOMAINS.some(domain =>
            parentDomain === domain || parentDomain.endsWith('.' + domain)
        );
        if (!isParentAllowed) throw 0;
    } catch {
        blockAccess('This game must be launched from the official portal.');
        return;
    }

    function blockAccess(message) {
        document.body.innerHTML = '';
        const overlay = document.createElement('div');
        overlay.innerHTML = `
            <div style="display:flex;align-items:center;justify-content:center;height:100vh;
            background:#000;color:#fff;font-family:Arial;text-align:center;">
                <div>
                    <h1 style="color:#d70000;font-size:2.5em;">🚫 Access Denied</h1>
                    <p style="font-size:1.2em;">${message}</p>
                </div>
            </div>`;
        overlay.style.cssText = 'position:fixed;inset:0;z-index:2147483647;';
        document.body.appendChild(overlay);
        document.body.style.overflow = 'hidden';
        throw new Error('Blocked');
    }

    // ❌ PAUSE SYSTEM REMOVED
})();
</script>




























    <div id="loading-text" style="color: white; font-size: 48px; font-family: cursive; text-align: center; margin-top: 20px;"> LOADING... </div>
    <div id="unityContainer"></div>
    <script src="Build/UnityLoader.js"></script>
    <script>
        var loadingText = document.querySelector("#loading-text");
    
        let totalBytes = 0;
        let loadedBytes = 0;
    
        async function getSize(url) {
            try {
                const res = await fetch(url, { method: "HEAD" });
                return parseInt(res.headers.get("Content-Length") || "0", 10);
            } catch {
                return 0;
            }
        }
    
        async function fetchWithProgress(url) {
            const response = await fetch(url);
            const reader = response.body.getReader();
            let chunks = [];
            let received = 0;
    
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                received += value.length;
                loadedBytes += value.length;
                chunks.push(value);
    
                let mbDone = (loadedBytes / (1024 * 1024)).toFixed(2);
                let mbTotal = '2127.52';
                loadingText.textContent = `LOADING... ${mbDone} MB / ${mbTotal} MB`;
            }
    
            let fullBuffer = new Uint8Array(received);
            let offset = 0;
            for (let chunk of chunks) {
                fullBuffer.set(chunk, offset);
                offset += chunk.length;
            }
            return fullBuffer.buffer;
        }
    
        async function mergeFiles(fileParts) {
            const buffers = await Promise.all(fileParts.map(part => fetchWithProgress(part)));
            const mergedBlob = new Blob(buffers);
            return URL.createObjectURL(mergedBlob);
        }
    
        function getParts(file, start, end) {
            let parts = [];
            for (let i = start; i <= end; i++) {
                parts.push(file + ".part" + i);
            }
            return parts;
        }
    
        function resizeUnityContainer() {
            var container = document.getElementById("unityContainer");
            container.style.width = window.innerWidth + "px";
            container.style.height = window.innerHeight + "px";
        }
    
        (async () => {
            const allParts = [
                ...getParts("Build/Build.asm.code.unityweb", 1, 3),
                ...getParts("Build/Build.data.unityweb", 1, 102),
                ...getParts("Build/Build.wasm.code.unityweb", 1, 2),
            ];
    
            const sizes = await Promise.all(allParts.map(getSize));
            totalBytes = sizes.reduce((a, b) => a + b, 0);
    
            const [asmurl, dataUrl, wasmurl] = await Promise.all([
                mergeFiles(getParts("Build/Build.asm.code.unityweb", 1, 3)),
                mergeFiles(getParts("Build/Build.data.unityweb", 1, 102)),
                mergeFiles(getParts("Build/Build.wasm.code.unityweb", 1, 2)),
            ]);
    
            const json = {
                "companyName": "SpanishFreddy",
                "productName": "Cuphead",
                "dataUrl": dataUrl,
                "wasmCodeUrl": wasmurl,
                "wasmFrameworkUrl": "Build.wasm.framework.unityweb",
                "asmCodeUrl": asmurl,
                "asmMemoryUrl": "Build.asm.memory.unityweb",
                "asmFrameworkUrl": "Build.asm.framework.unityweb",
                "TOTAL_MEMORY": 100000000,
                "graphicsAPI": ["WebGL 2.0"],
                "webglContextAttributes": { "preserveDrawingBuffer": false },
                "splashScreenStyle": "Dark",
                "backgroundColor": "#231F20"
            };
    
            let blob = new Blob([JSON.stringify(json)], { type: "application/json" });
            let blobUrl = URL.createObjectURL(blob);
            window.addEventListener("resize", resizeUnityContainer);
    
            UnityLoader.instantiate("unityContainer", json, {
                url: blobUrl,
                Module: {
                    onRuntimeInitialized: function () {
                        resizeUnityContainer();
                        document.querySelector("#loading-text").remove();
                    },
                },
            });
    
            function resizeCanvas() {
                var container = document.getElementById("unityContainer");
                container.style.width = window.innerWidth + "px";
                container.style.height = window.innerHeight + "px";
                setTimeout(resizeCanvas, 1000);
            }
            resizeCanvas();
        })();
    </script>
    
</body>
