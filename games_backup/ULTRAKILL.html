<body style="text-align: center; padding: 0; border: 0; margin: 0;">
<!-- DOMAIN PROTECTION SCRIPT - AUTO-GENERATED -->
<script>
(function() {
    'use strict';

    const ALLOWED_DOMAINS = [
        "portal.dever.pro",
        "www.portal.dever.pro",
        "localhost",
        "127.0.0.1",
        "gam12.netlify.app",
        "www.gam12.netlify.app"
];

    if (window.location.protocol === 'file:') {
        blockAccess('This game cannot be run from a local file.');
        return;
    }

    const currentDomain = window.location.hostname;
    const isAllowed = ALLOWED_DOMAINS.some(domain =>
        currentDomain === domain || currentDomain.endsWith('.' + domain)
    );

    if (!isAllowed) {
        blockAccess('This game can only be played on the official website.');
        return;
    }

    if (window.top === window.self) {
        blockAccess('This game must be launched from the official portal.');
        return;
    }

    try {
        const parentDomain = new URL(window.top.location.href).hostname;
        const isParentAllowed = ALLOWED_DOMAINS.some(domain =>
            parentDomain === domain || parentDomain.endsWith('.' + domain)
        );
        if (!isParentAllowed) throw 0;
    } catch {
        blockAccess('This game must be launched from the official portal.');
        return;
    }

    function blockAccess(message) {
        document.body.innerHTML = '';
        const overlay = document.createElement('div');
        overlay.innerHTML = `
            <div style="display:flex;align-items:center;justify-content:center;height:100vh;
            background:#000;color:#fff;font-family:Arial;text-align:center;">
                <div>
                    <h1 style="color:#d70000;font-size:2.5em;">🚫 Access Denied</h1>
                    <p style="font-size:1.2em;">${message}</p>
                </div>
            </div>`;
        overlay.style.cssText = 'position:fixed;inset:0;z-index:2147483647;';
        document.body.appendChild(overlay);
        document.body.style.overflow = 'hidden';
        throw new Error('Blocked');
    }

    // ❌ PAUSE SYSTEM REMOVED
})();
</script>




























    <div id='loading-text' style="color: black; font-family: cursive; font-size: 48px; text-align: center; margin-top: 20px;">LOADING...</div>
    <canvas id="unity-canvas" tabindex="-1" hidden></canvas>
    <script src="Build/ultrakill.loader.js"></script>
    <script>
        var canvas = document.querySelector("#unity-canvas");
        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            // Mobile device style: fill the whole browser client area with the game canvas:
            var meta = document.createElement('meta');
            meta.name = 'viewport';
            meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
            document.getElementsByTagName('head')[0].appendChild(meta);
            canvas.style.width = "100%";
            canvas.style.height = "100%";
            canvas.style.position = "fixed";
            document.body.style.textAlign = "left";
        } else {
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                canvas.style.width = window.innerWidth + "px";
                canvas.style.height = window.innerHeight + "px";
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
        }

        function mergeFiles(fileParts) {
            return new Promise((resolve, reject) => {
                let buffers = [];

                function fetchPart(index) {
                    if (index >= fileParts.length) {
                        let mergedBlob = new Blob(buffers);
                        let mergedFileUrl = URL.createObjectURL(mergedBlob);
                        resolve(mergedFileUrl);
                        return;
                    }
                    fetch(fileParts[index]).then((response) => response.arrayBuffer()).then((data) => {
                        buffers.push(data);
                        fetchPart(index + 1);
                    }).catch(reject);
                }
                fetchPart(0);
            });
        }

        function getParts(file, start, end) {
            let parts = [];
            for (let i = start; i <= end; i++) {
                parts.push(file + ".part" + i);
            }
            return parts;
        }
        Promise.all([
            mergeFiles(getParts("Build/ultrakill.data.unityweb", 1, 4)),
            mergeFiles(getParts("Build/ultrakill.wasm.unityweb", 1, 2))
        ]).then(([dataUrl, wasmurl]) => {
            document.querySelector("#unity-canvas").hidden = false;
            createUnityInstance(document.querySelector("#unity-canvas"), {
                dataUrl: dataUrl,
                frameworkUrl: "Build/ultrakill.framework.js.unityweb",
                codeUrl: wasmurl,
                streamingAssetsUrl: "StreamingAssets",
                companyName: "Hakita and Cake Logic",
                productName: "ULTRAKILL",
                productVersion: "1.4",
                // matchWebGLToCanvasSize: false, // Uncomment this to separately control WebGL canvas render size and DOM element size.
                // devicePixelRatio: 1, // Uncomment this to override low DPI rendering on high DPI displays.
            }).then((e) => {
                document.querySelector("#loading-text").remove();
            });
        });
    </script>
